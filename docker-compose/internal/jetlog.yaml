---
services:
  jetlog:
    container_name: jetlog
    image: pbogre/jetlog
    networks:
      - proxy
    env_file:
      - ../server.env    
    ports:
      - "${SERVER_IP}:8914:8914"
    volumes:
      - /mnt/user/appdata/internal/jetlog:/data # remember to add /data content from github repo (755)
    environment:
      - TZ=${TZ}
      - PUID=1000 # overwrites PUID from server.env
      - PGID=1000 # overwrites PGID from server.env
      - JETLOG_PORT=8914
    restart: unless-stopped

networks:
  proxy:
    name: ${DOCKER_NETWORK}
    driver: bridge
    external: true
